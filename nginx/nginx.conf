http {
    include       mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Block 1: Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name adrianabella.dev www.adrianabella.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Block 2: The Secure Website (HTTPS + HTTP/2)
    server {
        listen 443 ssl http2;
        server_name adrianabella.dev www.adrianabella.dev;

        ssl_certificate /etc/letsencrypt/live/adrianabella.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adrianabella.dev/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' wss: https:; object-src 'none';" always;

        # --- ADDED THIS FOR CERTBOT ---
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            access_log off;
        }

        location / {
            proxy_pass http://frontend:8080;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
